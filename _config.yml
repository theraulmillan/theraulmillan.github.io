# --- Required options --- #

# Name of website
title: Raúl E. Millán V.

# Your name to show in the footer
author: Raúl E. Millán V.

# Short description of your site
description: >
  Cybersecurity Solutions Architect | CISSP · CISM · CISA |
  Microsoft 365 & Azure Security | Zero Trust | GRC | LATAM

# --- List of links in the navigation bar --- #
navbar-links:
  About: "about"
  Blog: "blog"
  LinkedIn: "https://www.linkedin.com/in/raulmillan/"

# --- Logo --- #
avatar: "/assets/img/profile.png"
round-avatar: true

# --- Footer social media links --- #
social-network-links:
  linkedin: raulmillan
  github: theraulmillan
  instagram: theraulmillan
  # twitter: theraulmillan
  # email: rmillan@outlook.com

# --- General options --- #

share-links-active:
  twitter: false
  facebook: false
  linkedin: true

url-pretty: "the.raulmillan.com"

excerpt_length: 50

keywords: "cybersecurity, cloud security, microsoft 365, azure, zero trust, GRC, CISO, CISSP, CISM, CISA, LATAM, security architect, incident response, Defender, Sentinel, Purview, Entra ID"

# --- Colours --- #
navbar-col:        "#EAEAEA"
navbar-text-col:   "#404040"
navbar-border-col: "#DDDDDD"
page-col:          "#FFFFFF"
text-col:          "#404040"
link-col:          "#008AFF"
hover-col:         "#0085A1"
footer-col:        "#EAEAEA"
footer-text-col:   "#777777"
footer-link-col:   "#404040"

# --- Misc --- #
date_format: "%B %-d, %Y"
timezone: "America/Panama"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5
url: "https://the.raulmillan.com"

kramdown:
  input: GFM

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      social-share: true
      readtime: true
  - scope:
      path: ""
    values:
      layout: "page"
      show-avatar: true

exclude:
  - CHANGELOG.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - freelancer-theme-jekyll.gemspec
  - Rakefile

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
